version: '3.8'

services:
  web:
    build: .
    container_name: django_blog_app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=docker-local-secret-key-12345
      - DEBUG=True
    restart: always
